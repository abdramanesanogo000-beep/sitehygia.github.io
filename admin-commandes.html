<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toutes les commandes — Admin Kality Care</title>
    <link rel="stylesheet" href="yames.css">
    <style>
        .admin-page {
            padding: 20px 30px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .admin-header h1 {
            color: #185FA5;
            font-size: 22px;
        }

        .commandes-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }

        .commandes-table th {
            background: #185FA5;
            color: #fff;
            padding: 10px 12px;
            text-align: left;
            font-size: 13px;
        }

        .commandes-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            vertical-align: middle;
        }

        .commandes-table tr:hover {
            background: #f9f9f9;
        }

        .statut-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }

        .statut-badge.attente {
            background: #ffeaa7;
            color: #d68910;
        }

        .statut-badge.paye-non-livre {
            background: #d6eaf8;
            color: #1a5276;
        }

        .statut-badge.paye-livre {
            background: #e8f8f5;
            color: #117864;
        }

        .statut-badge.annulee {
            background: #fadbd8;
            color: #922b21;
        }

        .btn-gerer {
            background: #185FA5;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
        }

        .btn-gerer:hover {
            background: #0C447C;
        }

        .filtres-admin {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .filtre-btn {
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: 0.15s;
        }

        .filtre-btn.active {
            background: #185FA5;
            color: #fff;
            border-color: #185FA5;
        }

        .admin-back {
            background: #185FA5;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
        }

        .admin-back:hover {
            background: #0C447C;
        }

        .modal-cmd {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-cmd.active {
            display: flex;
        }

        .modal-cmd-box {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            max-width: 480px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-cmd-box h2 {
            color: #185FA5;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .btn-fermer {
            position: absolute;
            top: 12px;
            right: 14px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #888;
        }

        .detail-ligne {
            margin-bottom: 7px;
            font-size: 13px;
        }

        .detail-ligne strong {
            color: #0C447C;
        }

        .articles-liste {
            margin: 10px 0;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .articles-liste div {
            font-size: 13px;
            padding: 3px 0;
            border-bottom: 1px solid #eee;
        }

        .select-statut {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            margin: 10px 0 6px;
        }

        .textarea-notes {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            height: 65px;
            resize: none;
            margin-bottom: 10px;
        }

        .btn-sauvegarder {
            width: 100%;
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 11px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-sauvegarder:hover {
            background: #1e8449;
        }

        .btn-imprimer {
            width: 100%;
            background: #fff;
            color: #185FA5;
            border: 2px solid #185FA5;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            margin-top: 8px;
        }

        .btn-imprimer:hover {
            background: #f0f6ff;
        }

        @media print {
            body * { visibility: hidden; }
            #zone-impression, #zone-impression * { visibility: visible; }
            #zone-impression { position: fixed; left: 0; top: 0; width: 100%; }
        }

        .total-commande {
            font-size: 15px;
            font-weight: bold;
            color: #185FA5;
            margin-top: 8px;
            text-align: right;
        }

        .table-scroll {
            overflow-x: auto;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
        }

        .pagination button.active {
            background: #185FA5;
            color: #fff;
            border-color: #185FA5;
        }

        .pagination button:hover:not(.active) {
            background: #f0f0f0;
        }

        .pagination-info {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="admin-page">
        <div class="admin-header">
            <h1>📋 Toutes les commandes — Admin Kality Care</h1>
            <a href="admin.html" class="admin-back">← Retour au panel</a>
        </div>

        <div class="filtres-admin">
            <button class="filtre-btn active" onclick="filtrer('Toutes', this)">Toutes</button>
            <button class="filtre-btn" onclick="filtrer('En attente', this)">En attente</button>
            <button class="filtre-btn" onclick="filtrer('Payé non livré', this)">Payé non livré</button>
            <button class="filtre-btn" onclick="filtrer('Payé livré', this)">Payé livré</button>
            <button class="filtre-btn" onclick="filtrer('Annulée', this)">Annulées</button>
        </div>

        <div class="table-scroll">
            <table class="commandes-table">
                <thead>
                    <tr>
                        <th>N° Commande</th>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Téléphone</th>
                        <th>Total</th>
                        <th>Paiement</th>
                        <th>Statut</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tbody-commandes">
                    <tr>
                        <td colspan="8" style="text-align:center;padding:30px;color:#888;">Chargement...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
        <div class="pagination-info" id="pagination-info"></div>
    </div>

    <!-- MODAL DÉTAIL COMMANDE -->
    <div id="modal-cmd" class="modal-cmd">
        <div class="modal-cmd-box">
            <button class="btn-fermer" onclick="fermerModal()">✕</button>
            <h2 id="modal-titre">Commande</h2>
            <div id="modal-corps"></div>
            <div style="margin:12px 0 5px; font-weight:bold; color:#0C447C; font-size:13px;">Changer le statut :</div>
            <select class="select-statut" id="modal-statut">
                <option value="En attente">En attente</option>
                <option value="Payé non livré">Payé non livré</option>
                <option value="Payé livré">Payé livré</option>
                <option value="Annulée">Annulée</option>
            </select>
            <textarea class="textarea-notes" id="modal-notes" placeholder="Notes internes (optionnel)..."></textarea>
            <button class="btn-sauvegarder" onclick="sauvegarder()">✅ Sauvegarder</button>
            <button class="btn-imprimer" onclick="imprimerRecu()">🖨️ Imprimer le reçu</button>
        </div>
    </div>

    <!-- ZONE IMPRESSION CACHÉE -->
    <div id="zone-impression" style="display:none;"></div>

    <script>
        const API = "https://nslookup-cluster1-bydepfo-mongodb-net-1.onrender.com"; // ← REMPLACER par l'URL Render réelle après déploiement
        let pwd = localStorage.getItem("adminPwd") || "";
        let commandes = [];
        let numeroCourant = "";
        let pageActuelle = 1;
        const itemsParPage = 20;
        let filtreActuel = "Toutes";

        // Vérifier si connecté
        if (!pwd) {
            window.location.href = "admin.html";
        }

        // CHARGER COMMANDES
        async function chargerCommandes() {
            try {
                const res = await fetch(`${API}/api/admin/commandes`, {
                    headers: { "x-admin-password": pwd }
                });
                commandes = await res.json();
                afficherCommandes();
            } catch {
                document.getElementById("tbody-commandes").innerHTML =
                    `<tr><td colspan="8" style="text-align:center;color:#c0392b;padding:20px;">Erreur de chargement.</td></tr>`;
            }
        }

        // AFFICHER TABLEAU AVEC PAGINATION
        function afficherCommandes() {
            const tbody = document.getElementById("tbody-commandes");
            
            // Filtrer
            let listeFiltree = filtreActuel === "Toutes" ? commandes : commandes.filter(c => c.statut === filtreActuel);
            
            if (!listeFiltree.length) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:30px;color:#888;">Aucune commande.</td></tr>`;
                document.getElementById("pagination").innerHTML = "";
                document.getElementById("pagination-info").textContent = "";
                return;
            }

            const classesStatut = {
                "En attente": "attente",
                "Payé non livré": "paye-non-livre",
                "Payé livré": "paye-livre",
                "Annulée": "annulee"
            };

            // Pagination
           const totalPages = Math.ceil(listeFiltree.length / itemsParPage);
            const startIndex = (pageActuelle - 1) * itemsParPage;
            const endIndex = startIndex + itemsParPage;
            const pageData = listeFiltree.slice(startIndex, endIndex);

            tbody.innerHTML = "";
            pageData.forEach(cmd => {
                const date = new Date(cmd.date).toLocaleDateString("fr-FR");
                const cls = classesStatut[cmd.statut] || "attente";
                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td><strong>${cmd.numero}</strong></td>
            <td>${date}</td>
            <td>${cmd.client.nom}</td>
            <td>${cmd.client.telephone}</td>
            <td><strong>${cmd.total.toLocaleString()} F</strong></td>
            <td>${cmd.modePaiement}</td>
            <td><span class="statut-badge ${cls}">${cmd.statut}</span></td>
            <td><button class="btn-gerer" onclick="ouvrirModal('${cmd.numero}')">Gérer</button></td>
        `;
                tbody.appendChild(tr);
            });

            // Afficher pagination
            afficherPagination(totalPages, listeFiltree.length);
        }

        // AFFICHER PAGINATION
        function afficherPagination(totalPages, totalItems) {
            const pagination = document.getElementById("pagination");
            const paginationInfo = document.getElementById("pagination-info");
            
            pagination.innerHTML = "";
            
            if (totalPages <= 1) {
                paginationInfo.textContent = `${totalItems} commande(s)`;
                return;
            }

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.textContent = i;
                btn.className = i === pageActuelle ? "active" : "";
                btn.onclick = () => {
                    pageActuelle = i;
                    afficherCommandes();
                };
                pagination.appendChild(btn);
            }

            const startItem = (pageActuelle - 1) * itemsParPage + 1;
            const endItem = Math.min(pageActuelle * itemsParPage, totalItems);
            paginationInfo.textContent = `Affichage ${startItem}-${endItem} sur ${totalItems} commande(s)`;
        }

        // FILTRES
        function filtrer(statut, btn) {
            document.querySelectorAll(".filtre-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            filtreActuel = statut;
            pageActuelle = 1;
            afficherCommandes();
        }

        // MODAL
        function ouvrirModal(numero) {
            const cmd = commandes.find(c => c.numero === numero);
            if (!cmd) return;
            numeroCourant = numero;

            const date = new Date(cmd.date).toLocaleDateString("fr-FR");
            const heure = new Date(cmd.date).toLocaleTimeString("fr-FR");

            const articlesHtml = cmd.articles.map(a =>
                `<div>${a.nom} × ${a.quantite} = <strong>${a.sousTotal.toLocaleString()} F</strong></div>`
            ).join("");

            document.getElementById("modal-titre").textContent = `Commande ${numero}`;
            document.getElementById("modal-corps").innerHTML = `
        <div class="detail-ligne"><strong>Date :</strong> ${date} à ${heure}</div>
        <div class="detail-ligne"><strong>Client :</strong> ${cmd.client.nom}</div>
        <div class="detail-ligne"><strong>Téléphone :</strong> ${cmd.client.telephone}</div>
        <div class="detail-ligne"><strong>Adresse :</strong> ${cmd.client.adresse}</div>
        ${cmd.client.email ? `<div class="detail-ligne"><strong>Email :</strong> ${cmd.client.email}</div>` : ""}
        <div class="detail-ligne"><strong>Paiement :</strong> ${cmd.modePaiement}</div>
        <div class="articles-liste">${articlesHtml}</div>
        <div class="total-commande">Total : ${cmd.total.toLocaleString()} FCFA</div>
    `;

            document.getElementById("modal-statut").value = cmd.statut;
            document.getElementById("modal-notes").value = cmd.notes || "";
            document.getElementById("modal-cmd").classList.add("active");
        }

        function fermerModal() {
            document.getElementById("modal-cmd").classList.remove("active");
            numeroCourant = "";
        }

        function formaterPrix(montant) {
            return Number(montant).toLocaleString('fr-FR') + ' FCFA';
        }

        function imprimerRecu() {
            const cmd = commandes.find(c => c.numero === numeroCourant);
            if (!cmd) return;

            const dateFormatee = new Date(cmd.date).toLocaleString('fr-FR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            const lignesHtml = cmd.articles.map(a => `
                <tr>
                    <td style="padding:9px 12px;border-bottom:1px solid #e8eef5;font-size:13px;">${a.nom}</td>
                    <td style="padding:9px 12px;border-bottom:1px solid #e8eef5;text-align:center;font-size:13px;">${a.quantite}</td>
                    <td style="padding:9px 12px;border-bottom:1px solid #e8eef5;text-align:right;font-size:13px;font-weight:600;color:#185FA5;">${formaterPrix(a.sousTotal || a.prix * a.quantite)}</td>
                </tr>
            `).join('');

            const statutCouleurs = {
                'En attente': { bg: '#fff3cd', color: '#856404' },
                'Payé non livré': { bg: '#d6eaf8', color: '#1a5276' },
                'Payé livré': { bg: '#e8f8f5', color: '#117864' },
                'Annulée': { bg: '#fadbd8', color: '#922b21' }
            };
            const sc = statutCouleurs[cmd.statut] || { bg: '#eee', color: '#333' };

            const html = `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reçu ${cmd.numero}</title>
<style>
  @page { margin: 15mm; size: A4; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; margin: 0; padding: 0; color: #333; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div style="max-width:620px;margin:0 auto;border:1px solid #ddd;border-radius:10px;overflow:hidden;">

  <div style="background:linear-gradient(135deg,#185FA5,#0e3d6e);padding:28px;text-align:center;">
    <div style="font-size:30px;font-weight:900;color:#fff;letter-spacing:2px;">HYGIA</div>
    <div style="color:#a8d0f7;font-size:12px;margin-top:2px;">MATÉRIEL MÉDICAL PROFESSIONNEL — BAMAKO</div>
    <div style="margin-top:16px;display:inline-block;background:rgba(255,255,255,0.15);border-radius:8px;padding:10px 22px;">
      <div style="color:#ddeeff;font-size:10px;letter-spacing:1px;">REÇU DE COMMANDE</div>
      <div style="color:#fff;font-size:20px;font-weight:700;letter-spacing:2px;">${cmd.numero}</div>
    </div>
  </div>

  <div style="padding:20px 24px;background:#f8fbff;border-bottom:1px solid #e8eef5;">
    <table style="width:100%;border-collapse:collapse;">
      <tr>
        <td style="padding:5px 0;font-size:12px;color:#666;">Date</td>
        <td style="padding:5px 0;font-size:12px;text-align:right;font-weight:600;">${dateFormatee}</td>
      </tr>
      <tr>
        <td style="padding:5px 0;font-size:12px;color:#666;">Mode de paiement</td>
        <td style="padding:5px 0;font-size:12px;text-align:right;font-weight:600;">${cmd.modePaiement}</td>
      </tr>
      <tr>
        <td style="padding:5px 0;font-size:12px;color:#666;">Statut</td>
        <td style="padding:5px 0;text-align:right;">
          <span style="background:${sc.bg};color:${sc.color};font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;">${cmd.statut}</span>
        </td>
      </tr>
    </table>
  </div>

  <div style="padding:24px;">
    <p style="margin:0 0 20px;font-size:14px;">Bonjour <strong>${cmd.client.nom}</strong>, voici votre reçu de commande Hygia.</p>

    <div style="font-size:11px;font-weight:700;color:#185FA5;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Articles commandés</div>
    <table style="width:100%;border-collapse:collapse;border:1px solid #e8eef5;">
      <thead>
        <tr style="background:#185FA5;">
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#fff;">Produit</th>
          <th style="padding:9px 12px;text-align:center;font-size:11px;color:#fff;">Qté</th>
          <th style="padding:9px 12px;text-align:right;font-size:11px;color:#fff;">Montant</th>
        </tr>
      </thead>
      <tbody>${lignesHtml}</tbody>
    </table>

    <div style="margin-top:12px;background:#185FA5;border-radius:6px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;">
      <span style="color:#a8d0f7;font-size:13px;font-weight:600;">TOTAL</span>
      <span style="color:#fff;font-size:20px;font-weight:800;">${formaterPrix(cmd.total)}</span>
    </div>

    <div style="margin-top:20px;border:1px solid #e8eef5;border-radius:8px;padding:14px;">
      <div style="font-size:11px;font-weight:700;color:#185FA5;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Livraison</div>
      <p style="margin:3px 0;font-size:13px;"><strong>${cmd.client.nom}</strong></p>
      <p style="margin:3px 0;font-size:13px;color:#555;">${cmd.client.adresse}</p>
      <p style="margin:3px 0;font-size:13px;color:#555;">Tél : ${cmd.client.telephone}</p>
      ${cmd.client.email ? `<p style="margin:3px 0;font-size:13px;color:#555;">Email : ${cmd.client.email}</p>` : ''}
    </div>
  </div>

  <div style="background:#f0f4f8;padding:16px;text-align:center;border-top:1px solid #e8eef5;">
    <p style="margin:0;font-size:11px;color:#888;">Reçu généré par Hygia — Matériel médical professionnel à Bamako, Mali</p>
    <p style="margin:4px 0 0;font-size:11px;color:#aaa;">© ${new Date().getFullYear()} Hygia</p>
  </div>

</div>
</body>
</html>`;

            const fenetre = window.open('', '_blank', 'width=700,height=900');
            fenetre.document.write(html);
            fenetre.document.close();
            fenetre.focus();
            setTimeout(() => { fenetre.print(); }, 400);
        }

        // SAUVEGARDER STATUT
        async function sauvegarder() {
            const statut = document.getElementById("modal-statut").value;
            const notes = document.getElementById("modal-notes").value;

            try {
                const res = await fetch(`${API}/api/admin/commandes/${numeroCourant}/statut`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                        "x-admin-password": pwd
                    },
                    body: JSON.stringify({ statut, notes })
                });

                if (res.ok) {
                    fermerModal();
                    await chargerCommandes();
                } else {
                    alert("Erreur lors de la sauvegarde.");
                }
            } catch {
                alert("Impossible de joindre le serveur.");
            }
        }

        // Charger au démarrage
        chargerCommandes();
    </script>

</body>

</html>
